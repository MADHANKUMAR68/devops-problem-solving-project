<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Problem Solving Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        .box {
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            background: #1e293b;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 {
            color: #38bdf8;
        }
        p {
            font-size: 18px;
        }
        .tag {
            margin-top: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 New version 2.0</h1>
        <p>Application is running successfully!</p>
        <p>Served from host: <b>{{ hostname }}</b></p>
        <p class="tag">Next steps: Docker → Terraform → AWS → GitHub Actions → Monitoring</p>
    </div>
</body>
</html>
