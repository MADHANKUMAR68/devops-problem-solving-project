name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker rm -f flask-app || true
            sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }}
            sudo docker tag ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest
            sudo docker run -d -p 5000:5000 --name flask-app ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:${{ github.sha }}
